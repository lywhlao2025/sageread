name: Agent Lint

on:
  pull_request:
    branches: [main, master]

concurrency:
  group: agent-lint-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  harness:
    name: Harness Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Composite check
        run: pnpm run check

      - name: Verify harness
        run: pnpm run verify
